name: 🚀 Build, Test & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-templates:
    name: 🛡️ Validate Templates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://npm.pkg.github.com'
        scope: '@mvp-kit'

    - name: 🧠 Verify generated LLM docs are in sync
      run: node docs/scripts/context-sync.mjs --mode check

    - name: 🔍 Validate templates
      run: npx @mvp-kit/template-validator@latest core
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-template:
    name: 🧪 Test Template
    runs-on: ubuntu-latest
    needs: validate-templates
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Create test app with @mvp-kit/cli
      run: |
        pnpm dlx @mvp-kit/create@latest test-app --template-path . --yes --no-install --no-git

    - name: Verify generated AI context files
      run: |
        required_files=(
          "AGENTS.md"
          "CLAUDE.md"
          "CODEX.md"
          ".cursor/rules/mvpkit.mdc"
          "llms.txt"
          "docs/llm/context-map.md"
          "docs/llm/change-playbooks.md"
        )

        for file in "${required_files[@]}"; do
          if [ ! -f "test-app/${file}" ]; then
            echo "❌ Missing generated AI context file: ${file}"
            exit 1
          fi
        done

    - name: Verify no unresolved template variables
      run: |
        if rg -n '\{\{\s*[A-Za-z_]' test-app; then
          echo "❌ Unresolved template variables found in generated app"
          exit 1
        fi

    - name: Install test app dependencies
      working-directory: test-app
      run: pnpm install

    - name: Lint check
      working-directory: test-app
      run: pnpm run lint

    - name: Build
      working-directory: test-app
      run: pnpm run build

    - name: Type check
      working-directory: test-app
      run: pnpm run typecheck

  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: [validate-templates, test-template]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🏷️ Check release version from template config
      id: release
      run: |
        VERSION="v$(node -p "require('./template.json').version")"
        if git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "new-version=false" >> "$GITHUB_OUTPUT"
          echo "Tag $VERSION already exists. Skipping release."
        else
          echo "new-version=true" >> "$GITHUB_OUTPUT"
          echo "Tag $VERSION does not exist. Release will be created."
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Resolved version: $VERSION"

    - name: 🚀 Create Release
      if: steps.release.outputs.new-version == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.release.outputs.version }}
        release_name: "core @${{ steps.release.outputs.version }}"
        body: |
          ## MVPKit Core - Release

          **Version:** ${{ steps.release.outputs.version }}
          **Commit:** ${{ github.sha }}

          ### What's Changed
          - Latest core template with all updates
          - Validated template variables
          - Tested with CLI integration

          ### Usage
          ```bash
          # Download latest template
          npx @mvp-kit/create my-app --template core

          # Or specify this version explicitly
          npx @mvp-kit/create my-app --template core@${{ steps.release.outputs.version }}
          ```

          ### Template Features
          - Full-stack TypeScript monorepo
          - React + Vite frontend
          - Cloudflare Workers backend
          - Shared UI components
          - Database integration ready

          **Full Changelog:** https://github.com/mvp-kit/core/releases
        draft: false
        prerelease: false
