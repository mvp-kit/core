name = "hello-world-api"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
# account_id = "<your-cloudflare-account-id>"

# Default resources (development/local)
[[d1_databases]]
binding = "DB"
database_name = "hello-world-db-dev"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "KV"
id = "0000000000000000000000000000000000"

[[r2_buckets]]
binding = "R2"
bucket_name = "hello-world-bucket-dev"

# Local development server configuration
[dev]
port = 8787
local_protocol = "http"
upstream_protocol = "http"


# Production environment (used for deployment)
[env.production]
name = "hello-world-api"

[env.production.vars]
NODE_ENV = "production"
DOMAIN = "app.hello-world.mvpkit.dev"
TRUSTED_ORIGINS = "https://hello-world.mvpkit.dev,https://app.hello-world.mvpkit.dev,https://www.hello-world.mvpkit.dev"
# Set COOKIE_DOMAIN only when web and app use a shared custom parent domain.
COOKIE_DOMAIN = "hello-world.mvpkit.dev"

[[env.production.d1_databases]]
binding = "DB"
database_name = "hello-world-db"
database_id = "b68f44d5-9a29-4ac5-9e16-2f0d8cfd8685"
migrations_dir = "drizzle"

[[env.production.kv_namespaces]]
binding = "KV"
id = "04cba09893334fd48e8edc2414a01275"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "hello-world-bucket"
